name: Release

on:
  push:
    tags:
      - 'v*' # Triggert nur bei Version-Tags wie v1.0.2

permissions:
  contents: write # Wichtig: Damit die Action den Release erstellen darf

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Mac haben wir hier wie besprochen rausgenommen
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # LTS ist sicherer für Releases
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Publish
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Upload Artifacts (Optional)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.deb
            dist/*.AppImage